name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t gitops-demo .

      - name: Tag Image
        run: |
          docker tag gitops-demo:latest 759945100402.dkr.ecr.eu-north-1.amazonaws.com/gitops-demo:${{ github.sha }}

      - name: Push Image
        run: |
          docker push 759945100402.dkr.ecr.eu-north-1.amazonaws.com/gitops-demo:${{ github.sha }}
