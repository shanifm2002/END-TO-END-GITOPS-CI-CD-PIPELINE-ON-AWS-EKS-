apiVersion: apps/v1
kind: Deployment

metadata:
  name: gitops-demo
  namespace: gitops-demo
  labels:
    app: gitops-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: gitops-demo

  template:
    metadata:
      labels:
        app: gitops-demo

    spec:
      containers:
      - name: gitops-demo

        image: 759945100402.dkr.ecr.eu-north-1.amazonaws.com/gitops-demo:96461af7d433d71f5bcbceb9c94f0ed3dc952c20

        imagePullPolicy: Always

        ports:
        - containerPort: 8081

        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 20